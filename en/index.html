<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo Squalo Tenerife — Accommodation</title>
    <meta name="description" content="Villas, rural houses, apartments, surf houses, hostel and coliving across Tenerife. Lo Squalo — since 2009.">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-main); }
        .land { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px 90px; }
        .land .logo-mark { width: 220px; height: 62px; margin-bottom: 6px; }
        .land .since { font-size: 0.78rem; letter-spacing: 3px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 40px; }
        .land h1 { font-size: 2rem; color: var(--blu-squalo); letter-spacing: 1px; margin-bottom: 14px; font-weight: 700; }
        .land p { font-size: 1.05rem; color: var(--text-primary); line-height: 1.6; max-width: 540px; margin: 0 auto 34px; }
        .land .cta {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--blu-squalo), #1f4a5f); color: #fff;
            text-decoration: none; font-weight: 600; font-size: 1rem;
            padding: 16px 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(47,111,143,0.30);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .land .cta:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(47,111,143,0.40); }
    </style>
</head>
<body>
    <main class="land">
        <span class="logo-mark" aria-label="Lo Squalo"></span>
        <span class="since">&copy; since 2009</span>
        <h1>Accommodation in Tenerife</h1>
        <p>Villas, rural houses, apartments, surf houses, hostel and coliving — handpicked across the island by Lo Squalo, your hub in Tenerife since 2009.</p>
        <a href="alloggio.html" class="cta"><span>&#127968;</span> Explore accommodation &rarr;</a>
    </main>
    <script src="/lang-switch.js"></script>
</body>
</html>
