<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventi - Lo Squalo Tenerife</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-eventi">
    <div class="container">
        <header>
            <a href="index.html" class="logo-link" aria-label="Lo Squalo">
                <span class="logo-mark"></span>
            </a>
            <span class="tagline">&copy; since 2009</span>
        </header>

        <main class="page-map" data-state="categories">
            <!-- SVG per le linee dinamiche -->
            <svg class="connections" id="svg-connections">
                <!-- Linee: Centro -> Sotto-categorie -->
                <line class="line main-line" id="line-center-fooddrink"></line>
                <line class="line main-line" id="line-center-servizi"></line>
                <line class="line main-line" id="line-center-nextevent"></line>

                <!-- Linee Food & Drink -->
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-bodegas"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-guacinches"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-cocktailbar"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-cucinatipica"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-italiana"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-mediterranea"></line>
                <line class="line sub-line" data-category="fooddrink" id="line-fooddrink-surfbar"></line>
            </svg>

            <!-- Centro - Categoria -->
            <div class="center-node category-center" id="category-trigger">
                <div class="category-icon eventi-bg">
                    <span>EVENTI</span>
                </div>
                <span class="click-hint">Clicca per esplorare</span>
            </div>

            <!-- Sotto-categorie (Livello 2) -->
            <div class="primary-nodes">
                <div class="node node-primary fooddrink-node" id="node-fooddrink" data-category="fooddrink">
                    <span>Food &<br>Drink</span>
                </div>
                <a href="https://wa.me/34616794190?text=Ciao%2C%20vorrei%20info%20sui%20servizi%20privati%20per%20il%20mio%20evento" target="_blank" rel="noopener" class="node node-primary servizi-node" id="node-servizi">
                    <span>Servizi<br>Privati</span>
                </a>
                <a href="#next-event" class="node node-primary nextevent-node" id="node-nextevent">
                    <span>Next<br>Event</span>
                </a>
            </div>

            <!-- Elementi Livello 3 - FOOD & DRINK -->
            <div class="sub-nodes" data-parent="fooddrink">
                <a href="#bodegas" class="node node-secondary item-bodegas" id="node-bodegas">
                    <span>Bodegas</span>
                </a>
                <a href="#guacinches" class="node node-secondary item-guacinches" id="node-guacinches">
                    <span>Guachinches</span>
                </a>
                <a href="#cocktailbar" class="node node-secondary item-cocktailbar" id="node-cocktailbar">
                    <span>Cocktail<br>Bar</span>
                </a>
                <a href="#cucinatipica" class="node node-secondary item-cucinatipica" id="node-cucinatipica">
                    <span>Cucina<br>Tipica</span>
                </a>
                <a href="#italiana" class="node node-secondary item-italiana" id="node-italiana">
                    <span>Italiana</span>
                </a>
                <a href="#mediterranea" class="node node-secondary item-mediterranea" id="node-mediterranea">
                    <span>Mediterranea</span>
                </a>
                <a href="#surfbar-food" class="node node-secondary item-surfbar-food" id="node-surfbar-food">
                    <span>Surf Bar</span>
                </a>
            </div>

            <!-- Pulsante indietro -->
            <button class="back-btn" id="back-btn">
                <span>&larr;</span> Indietro
            </button>
        </main>

        <a href="index.html?explore=1" class="home-button">
            <span>&larr;</span> Home
        </a>
    </div>

    <script src="pages.js"></script>
    <script src="whatsapp-i18n.js"></script>
</body>
</html>
