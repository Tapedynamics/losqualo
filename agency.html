<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency B2B - Lo Squalo Tenerife</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-agency">
    <div class="container">
        <header>
            <a href="index.html" class="logo-link" aria-label="Lo Squalo">
                <span class="logo-mark"></span>
            </a>
            <span class="tagline">&copy; since 2009</span>
        </header>

        <main class="page-map" data-state="categories">
            <!-- SVG per le linee dinamiche -->
            <svg class="connections" id="svg-connections">
                <!-- Linee: Centro -> 3 nodi -->
                <line class="line main-line" id="line-center-portfolio"></line>
                <line class="line main-line" id="line-center-servizi"></line>
                <line class="line main-line" id="line-center-contact"></line>

                <!-- Linee Contact & Social -->
                <line class="line sub-line" data-category="contact" id="line-contact-instagram"></line>
                <line class="line sub-line" data-category="contact" id="line-contact-facebook"></line>
                <line class="line sub-line" data-category="contact" id="line-contact-tiktok"></line>
                <line class="line sub-line" data-category="contact" id="line-contact-google"></line>
                <line class="line sub-line" data-category="contact" id="line-contact-email"></line>
            </svg>

            <!-- Centro - Categoria -->
            <div class="center-node category-center" id="category-trigger">
                <div class="category-icon agency-bg">
                    <span>AGENCY<br>B2B</span>
                </div>
                <span class="click-hint">Clicca per esplorare</span>
            </div>

            <!-- Sotto-categorie (Livello 2) - 3 nodi -->
            <div class="primary-nodes">
                <a href="https://t.mtrbio.com/losqualoagency" target="_blank" rel="noopener" class="node node-primary portfolio-node" id="node-portfolio">
                    <span>Portfolio</span>
                </a>
                <a href="agency/oferta.html" class="node node-primary servizi-node" id="node-servizi">
                    <span>Servizi<br>e Prezzi</span>
                </a>
                <div class="node node-primary contact-node" id="node-contact" data-category="contact">
                    <span>Contact<br>&amp; Social</span>
                </div>
            </div>

            <!-- Elementi Livello 3 - CONTACT & SOCIAL -->
            <div class="sub-nodes" data-parent="contact">
                <a href="https://instagram.com/losqualoagency" target="_blank" rel="noopener" class="node node-secondary item-instagram" id="node-instagram">
                    <span>Instagram</span>
                </a>
                <a href="https://facebook.com/losqualoagency" target="_blank" rel="noopener" class="node node-secondary item-facebook" id="node-facebook">
                    <span>Facebook</span>
                </a>
                <a href="https://tiktok.com/@agencylosqualotenerife" target="_blank" rel="noopener" class="node node-secondary item-tiktok" id="node-tiktok">
                    <span>TikTok</span>
                </a>
                <a href="https://share.google/EPTc7zGdCKpWTuL87" target="_blank" rel="noopener" class="node node-secondary item-google" id="node-google">
                    <span>Google</span>
                </a>
                <a href="mailto:agency.losqualotenerife@gmail.com" class="node node-secondary item-email" id="node-email">
                    <span>Email</span>
                </a>
            </div>

            <!-- Pulsante indietro -->
            <button class="back-btn" id="back-btn">
                <span>&larr;</span> Indietro
            </button>
        </main>

        <a href="index.html?explore=1" class="home-button">
            <span>&larr;</span> Home
        </a>
    </div>

    <script src="pages.js"></script>
</body>
</html>
