<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Lo Squalo - Tenerife Experience</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-main); }
        .brand-page { max-width: 760px; margin: 0 auto; padding: 0 24px 130px; }

        /* ===== Testo descrittivo in alto ===== */
        .brand-intro {
            text-align: center;
            margin: 30px auto 10px;
            max-width: 560px;
        }
        .brand-intro h1 {
            font-size: 1.5rem;
            color: var(--blu-squalo);
            letter-spacing: 1px;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .brand-intro p {
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.65;
        }

        /* ===== Schema radiale: logo al centro, nodi intorno ===== */
        .brand-radial {
            position: relative;
            width: min(460px, 88vw);
            height: min(460px, 88vw);
            margin: 40px auto 0;
        }

        .brand-radial-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 38%;
            height: 38%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .brand-radial-center .logo-mark {
            width: 78%;
            height: 38%;
        }

        .brand-node {
            position: absolute;
            width: 18%;
            height: 18%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .brand-node:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
            z-index: 10;
        }
        .brand-node svg { width: 50%; height: 50%; fill: white; }

        /* Posizioni radiali (6 nodi esagonali, leggermente alzati) */
        /* Usiamo nth-of-type perche' brand-radial-center e' un <div> mentre i nodi sono <a> */
        .brand-node:nth-of-type(1) { top: 5%;  left: 50%;   }   /* Top - mtrbio */
        .brand-node:nth-of-type(2) { top: 25%; left: 82.9%; }   /* Top-right - WhatsApp */
        .brand-node:nth-of-type(3) { top: 60%; left: 82.9%; }   /* Bottom-right - Instagram */
        .brand-node:nth-of-type(4) { top: 78%; left: 50%;   }   /* Bottom - Facebook */
        .brand-node:nth-of-type(5) { top: 60%; left: 17.1%; }   /* Bottom-left - TikTok */
        .brand-node:nth-of-type(6) { top: 25%; left: 17.1%; }   /* Top-left - YouTube */

        /* Colori nodi per rete */
        .node-ig { background: linear-gradient(135deg, #fa7e1e, #d62976 55%, #962fbf); }
        .node-fb { background: linear-gradient(135deg, #1877F2, #0d5fd0); }
        .node-wa { background: linear-gradient(135deg, #25D366, #128C7E); }
        .node-mtrbio { background: linear-gradient(135deg, #2f6f8f, #5fa6c6); }
        .node-tk { background: linear-gradient(135deg, #25F4EE, #000 50%, #FE2C55); }
        .node-yt { background: linear-gradient(135deg, #FF0000, #c10000); }

        @media (max-width: 768px) {
            .brand-intro h1 { font-size: 1.3rem; }
            /* Lascia spazio in fondo al pulsante Home flottante */
            .brand-page { padding-bottom: 170px; }
            /* Alza il nodo in basso (Facebook) per evitare overlap col bottone Home */
            .brand-node:nth-of-type(4) { top: 72%; }
        }
    </style>
</head>
